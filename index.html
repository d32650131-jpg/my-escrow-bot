<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Меню сделок</title>
    <style>
        /* Сброс стилей */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #1e2026; /* Темный фон Telegram */
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Контейнер для кнопок */
        .menu-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
            margin-bottom: auto;
        }

        /* Базовый стиль кнопок */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 10px; /* Закругленные углы */
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: opacity 0.2s ease;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            opacity: 0.7;
            transform: scale(0.98);
        }

        .btn span {
            margin-right: 10px;
            font-size: 20px;
        }

        /* ГОЛУБОЙ (Бирюзовый) стиль для стандартных кнопок */
        .btn-blue {
            background-color: #2b7a8a; /* Глубокий бирюзово-голубой */
        }
        
        .btn-blue:hover {
            background-color: #346d7a;
        }

        /* КРАСНЫЙ (Кирпичный) стиль для кнопки поддержки */
        .btn-red {
            background-color: #a33f3f; /* Темно-красный/кирпичный */
            margin-top: 20px; /* Отступ сверху */
        }
        
        .btn-red:hover {
            background-color: #8a3434;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <!-- Кнопки управления -->
        <button class="btn btn-blue" onclick="sendAction('create_deal')">
            <span>🧰</span> Создать сделку
        </button>
        <button class="btn btn-blue" onclick="sendAction('settings_payment')">
            <span>💳</span> Настроить реквизиты
        </button>
        <button class="btn btn-blue" onclick="sendAction('my_deals')">
            <span>📂</span> Мои сделки
        </button>
        <button class="btn btn-blue" onclick="sendAction('referral_system')">
            <span>🔗</span> Реферальная ссылка
        </button>

        <!-- Красная кнопка в самом низу -->
        <button class="btn btn-red" onclick="sendAction('support')">
            <span>🆘</span> Поддержка
        </button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Расширяем на весь экран
        tg.expand();

        // Функция отправки данных боту и закрытия
        function sendAction(action) {
            // Отправляем строку с командой боту
            tg.sendData(action);
            // Закрываем Web App
            tg.close();
        }
    </script>
</body>
</html>
